<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <script src="https://cdn.tailwindcss.com"></script>
    <title>School Maps</title>
    <!-- Font Icon -->
     <link rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">

      <!-- CSS -->
    <link rel="stylesheet" href="css/style.css">
    <title> Green Valley School Maps</title>
</head>

<body>
    <header class="flex justify-between items-center px-8 py-4 bg-white shadow-md">
        <div class="logo">
            <h1 class="text-2xl font-bold text-blue-600">School Maps</h1>
        </div>

        <div class="search">
            <input type="search" placeholder="Search Building..." class="border rounded-lg px-4 py-2 w-80">
        </div>
        <div class="profile">
            <span class="font-medium">Guest</span>
        </div>
    </header>

    <main>
        <section class="map-container"></section>
        <aside class="building-info"></aside>
    </main>

    <script src="js/script.js"></script>
</body>
</html>
