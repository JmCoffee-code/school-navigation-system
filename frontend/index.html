<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <script src="https://cdn.tailwindcss.com"></script>
    <title>Green Valley School Maps</title>
    
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">

    <!-- CSS -->
    <link rel="stylesheet" href="css/style.css">
</head>

<body class="bg-gray-50 min-h-screen flex flex-col font-sans">

    <!-- ================= HEADER ================= -->
    <header class="flex justify-between items-center px-8 py-4 bg-white shadow-md z-10">
        <div class="logo flex items-center gap-3">
            <i class="fa-solid fa-school text-blue-600 text-2xl"></i>
            <div>
                <h1 class="text-2xl font-bold text-blue-600 leading-tight">School Maps</h1>
                <p class="text-xs text-gray-500">Green Valley Campus</p>
            </div>
        </div>

        <div class="search relative">
            <i class="fa-solid fa-magnifying-glass absolute left-3 top-1/2 -translate-y-1/2 text-gray-400"></i>
            <input type="search" placeholder="Search Building..." class="border rounded-lg pl-9 pr-4 py-2 w-80 focus:outline-none focus:ring-2 focus:ring-blue-500">
        </div>

        <div class="profile flex items-center gap-3">
            <button class="text-gray-500 hover:text-blue-600 p-2 rounded-full transition">
                <i class="fa-solid fa-bell"></i>
            </button>
            <div class="w-8 h-8 rounded-full bg-blue-100 text-blue-600 font-bold flex items-center justify-center border border-blue-200">
                G
            </div>
            <span class="font-medium text-gray-700">Guest</span>
        </div>
    </header>

    <!-- ================= MAIN DASHBOARD ================= -->
    <main class="flex-1 flex overflow-hidden h-[calc(100vh-73px)]">

        <!-- LEFT SIDE: MAP & CONTROLS -->
        <section class="map-container flex-1 flex flex-col p-4 gap-4 relative">
            <!-- Filter Toolbar -->
            <div class="map-toolbar flex gap-2 bg-white p-2 rounded-lg shadow-sm border border-gray-100 w-fit">
                <button class="px-4 py-1.5 rounded-md bg-green-600 text-white text-sm font-medium">All Buildings</button>
                <button class="px-4 py-1.5 rounded-md hover:bg-gray-100 text-gray-600 text-sm font-medium transition">Academic</button>
                <button class="px-4 py-1.5 rounded-md hover:bg-gray-100 text-gray-600 text-sm font-medium transition">Offices</button>
                <button class="px-4 py-1.5 rounded-md hover:bg-gray-100 text-gray-600 text-sm font-medium transition">Facilities</button>
            </div>

            <!-- Campus Map Canvas Container -->
            <div class="campus-map flex-1 bg-blue-50/50 rounded-xl border-2 border-dashed border-gray-200 flex items-center justify-center relative overflow-hidden">
                <div class="text-center text-gray-400">
                    <i class="fa-solid fa-map-location-dot text-5xl mb-2"></i>
                    <p class="font-medium">Campus Map Embed / Canvas Area</p>
                </div>

                <!-- Zoom Controls Overlay -->
                <div class="absolute bottom-4 right-4 flex flex-col gap-1 bg-white shadow-md rounded-lg p-1 border border-gray-100">
                    <button class="w-8 h-8 flex items-center justify-center text-gray-600 hover:bg-gray-100 rounded"><i class="fa-solid fa-plus"></i></button>
                    <button class="w-8 h-8 flex items-center justify-center text-gray-600 hover:bg-gray-100 rounded"><i class="fa-solid fa-minus"></i></button>
                </div>
            </div>
        </section>

        <!-- RIGHT SIDE: BUILDING DETAILS PANEL -->
        <aside class="building-info w-96 bg-white border-l border-gray-200 p-6 flex flex-col justify-between overflow-y-auto">
            <div class="space-y-6">
                <div class="building-header border-b pb-4">
                    <span class="inline-block text-xs font-semibold uppercase tracking-wider text-blue-600 bg-blue-50 px-2 py-1 rounded mb-2">Administrative</span>
                    <h2 class="text-xl font-bold text-gray-800">Main Building</h2>
                    <p class="text-sm text-gray-500">Select a building on the map for details.</p>
                </div>

                <div class="building-image h-40 bg-gray-100 rounded-lg overflow-hidden flex items-center justify-center border border-gray-200">
                    <i class="fa-solid fa-image text-gray-300 text-3xl"></i>
                </div>

                <div class="building-details space-y-3">
                    <h3 class="text-sm font-semibold text-gray-700 uppercase tracking-wide">Key Offices & Rooms</h3>
                    <ul class="space-y-2 text-sm text-gray-600">
                        <li class="flex items-center gap-2"><i class="fa-solid fa-circle text-[6px] text-blue-500"></i> Registrar's Office</li>
                        <li class="flex items-center gap-2"><i class="fa-solid fa-circle text-[6px] text-blue-500"></i> Cashier / Accounting</li>
                        <li class="flex items-center gap-2"><i class="fa-solid fa-circle text-[6px] text-blue-500"></i> Dean's Office</li>
                        <li class="flex items-center gap-2"><i class="fa-solid fa-circle text-[6px] text-blue-500"></i> Faculty Lounge</li>
                    </ul>
                </div>
            </div>

            <button class="navigate w-full mt-6 bg-blue-600 hover:bg-blue-700 text-white font-medium py-2.5 rounded-lg flex items-center justify-center gap-2 transition shadow-sm">
                <i class="fa-solid fa-location-arrow"></i>
                Get Directions
            </button>
        </aside>

    </main>

    <script src="js/script.js"></script>
</body>

</html>
